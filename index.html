<!DOCTYPE html>
<html>
<head>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }
    .header { background: #06C755; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
    .menu { display: flex; flex-direction: column; gap: 10px; padding: 20px; }
    .menu-btn { background: white; border: none; border-radius: 10px; padding: 20px; text-align: left; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; gap: 15px; }
    .menu-btn .icon { font-size: 24px; }
    .menu-btn .title { font-weight: bold; }
    .menu-btn .desc { font-size: 12px; color: #888; margin-top: 3px; }
    .screen { display: none; padding: 20px; }
    .screen.active { display: block; }
    .back-btn { background: none; border: none; color: #06C755; font-size: 16px; cursor: pointer; margin-bottom: 15px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
    .tag-input { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: white; min-height: 45px; }
    .tag { background: #06C755; color: white; padding: 3px 10px; border-radius: 20px; font-size: 14px; display: flex; align-items: center; gap: 5px; }
    .tag-del { cursor: pointer; font-size: 16px; }
    .tag-add { display: flex; gap: 5px; margin-top: 5px; }
    .tag-add input { flex: 1; }
    .tag-add button { background: #06C755; color: white; border: none; border-radius: 5px; padding: 10px 15px; cursor: pointer; }
    .save-btn { width: 100%; padding: 15px; background: #06C755; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .preview-btn { width: 100%; padding: 15px; background: #007AFF; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .save-btn:disabled, .preview-btn:disabled { background: #aaa; }
    .status { margin-top: 10px; padding: 10px; border-radius: 5px; text-align: center; display: none; }
    .status.success { background: #e0ffe0; color: green; display: block; }
    .status.error { background: #ffe0e0; color: red; display: block; }
    #initStatus { padding: 20px; text-align: center; color: #888; }
    .tab-btn { flex: 1; padding: 10px; border-radius: 5px; border: 2px solid #06C755; font-size: 15px; cursor: pointer; }
    .tab-btn.active { background: #06C755; color: white; }
    .tab-btn.inactive { background: white; color: #06C755; }

    /* シフト表プレビュー */
    .preview-container { margin-top: 20px; overflow-x: auto; }
    .preview-table { border-collapse: collapse; width: 100%; min-width: 500px; font-size: 12px; }
    .preview-table th { background: #06C755; color: white; padding: 8px; text-align: center; border: 1px solid #ddd; }
    .preview-table td { padding: 8px; border: 1px solid #ddd; text-align: center; vertical-align: middle; }
    .preview-table .section-cell { background: #f0f0f0; font-weight: bold; text-align: left; padding-left: 10px; }
    .shift-bar { background: #06C755; color: white; border-radius: 5px; padding: 3px 5px; font-size: 11px; white-space: nowrap; }
    .empty-cell { background: #fafafa; }
  </style>
</head>
<body>

<div class="header">🏪 シフト管理（管理者）</div>
<div id="initStatus">初期化中...</div>

<!-- メインメニュー -->
<div id="menuScreen" class="screen">
  <div class="menu">
    <button class="menu-btn" onclick="showScreen('storeScreen')">
      <span class="icon">🏪</span>
      <div>
        <div class="title">店舗情報設定</div>
        <div class="desc">営業時間・定休日・セクションを設定</div>
      </div>
    </button>
    <button class="menu-btn" onclick="showScreen('settingsScreen')">
      <span class="icon">⚙️</span>
      <div>
        <div class="title">シフト設定</div>
        <div class="desc">締切・提出期限・通知タイミングを設定</div>
      </div>
    </button>
    <button class="menu-btn" onclick="showScreen('shiftScreen')">
      <span class="icon">📅</span>
      <div>
        <div class="title">シフト枠設定</div>
        <div class="desc">時間枠・必要人数を設定・プレビュー確認</div>
      </div>
    </button>
    <button class="menu-btn" onclick="showScreen('staffScreen')">
      <span class="icon">👥</span>
      <div>
        <div class="title">スタッフ管理</div>
        <div class="desc">スタッフ一覧・権限変更</div>
      </div>
    </button>
  </div>
</div>

<!-- 店舗情報設定 -->
<div id="storeScreen" class="screen">
  <button class="back-btn" onclick="showScreen('menuScreen')">← 戻る</button>
  <h3 style="margin-bottom:20px">🏪 店舗情報設定</h3>
  <div class="form-group">
    <label>店舗名</label>
    <input type="text" id="storeName" placeholder="例: テスト店舗">
  </div>
  <div class="form-group">
    <label>営業開始時間</label>
    <select id="openTime"></select>
  </div>
  <div class="form-group">
    <label>営業終了時間</label>
    <select id="closeTime"></select>
  </div>
  <div class="form-group">
    <label>定休日</label>
    <select id="holiday">
      <option value="">なし</option>
      <option value="月曜日">月曜日</option>
      <option value="火曜日">火曜日</option>
      <option value="水曜日">水曜日</option>
      <option value="木曜日">木曜日</option>
      <option value="金曜日">金曜日</option>
      <option value="土曜日">土曜日</option>
      <option value="日曜日">日曜日</option>
    </select>
  </div>
  <div class="form-group">
    <label>セクション（任意）</label>
    <div class="tag-input" id="sectionTags"></div>
    <div class="tag-add">
      <input type="text" id="sectionInput" placeholder="例: ホール">
      <button onclick="addSection()">追加</button>
    </div>
  </div>
  <button class="save-btn" id="storeSaveBtn" onclick="saveStore()">保存する</button>
  <div class="status" id="storeStatus"></div>
</div>

<!-- シフト設定 -->
<div id="settingsScreen" class="screen">
  <button class="back-btn" onclick="showScreen('menuScreen')">← 戻る</button>
  <h3 style="margin-bottom:20px">⚙️ シフト設定</h3>
  <div class="form-group">
    <label>締切サイクル</label>
    <select id="cycle">
      <option value="1ヶ月">1ヶ月</option>
      <option value="15日">15日刻み</option>
    </select>
  </div>
  <div class="form-group">
    <label>締切日（毎月何日）</label>
    <select id="deadline"></select>
  </div>
  <div class="form-group">
    <label>提出期限（毎月何日）</label>
    <select id="submitDeadline"></select>
  </div>
  <div class="form-group">
    <label>通知タイミング（締切何日前）</label>
    <select id="notifyTiming">
      <option value="1">1日前</option>
      <option value="2">2日前</option>
      <option value="3">3日前</option>
      <option value="5">5日前</option>
      <option value="7">7日前</option>
    </select>
  </div>
  <button class="save-btn" id="settingsSaveBtn" onclick="saveSettings()">保存する</button>
  <div class="status" id="settingsStatus"></div>
</div>

<!-- シフト枠設定 -->
<div id="shiftScreen" class="screen">
  <button class="back-btn" onclick="showScreen('menuScreen')">← 戻る</button>
  <h3 style="margin-bottom:15px">📅 シフト枠設定</h3>

  <div style="display:flex; gap:10px; margin-bottom:15px;">
    <button id="weekdayTab" class="tab-btn active" onclick="switchDayType('平日')">平日</button>
    <button id="holidayTab" class="tab-btn inactive" onclick="switchDayType('休日')">休日</button>
  </div>

  <div id="shiftSections"></div>

  <button class="preview-btn" onclick="showPreview()">👁️ プレビューを確認</button>
  <button class="save-btn" id="shiftSaveBtn" onclick="saveShiftTemplate()">保存する</button>
  <div class="status" id="shiftStatus"></div>

  <!-- プレビュー -->
  <div id="previewArea" style="display:none; margin-top:20px;">
    <h4 style="margin-bottom:10px;">📊 シフト表プレビュー（<span id="previewDayType"></span>）</h4>
    <div class="preview-container">
      <table class="preview-table" id="previewTable"></table>
    </div>
  </div>
</div>

<!-- スタッフ管理 -->
<div id="staffScreen" class="screen">
  <button class="back-btn" onclick="showScreen('menuScreen')">← 戻る</button>
  <h3>👥 スタッフ管理</h3>
  <p style="margin-top:20px; color:#888">近日実装予定</p>
</div>

<script>
  const MY_LIFF_ID = "2009335817-RHdXW8FZ";
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwHFgzr7x-Ax-_qZzztekA75Aset0tQgb0_0tJ140eEt5zO-a-0HE6oOljTMTY1Wo9Y/exec";
  let userProfile = null;
  let storeId = null;
  let sections = [];
  let currentDayType = '平日';
  let shiftTemplateData = { '平日': {}, '休日': {} };

  function generateTimeOptions(selectId) {
    const select = document.getElementById(selectId);
    for (let h = 0; h < 24; h++) {
      for (let m of [0, 30]) {
        const time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        const opt = document.createElement('option');
        opt.value = time;
        opt.text = time;
        select.appendChild(opt);
      }
    }
  }

  function generateDayOptions(selectId) {
    const select = document.getElementById(selectId);
    for (let d = 1; d <= 31; d++) {
      const opt = document.createElement('option');
      opt.value = d;
      opt.text = `${d}日`;
      select.appendChild(opt);
    }
  }

  function generateTimeOptionsHTML(selected) {
    let html = '';
    for (let h = 0; h < 24; h++) {
      for (let m of [0, 30]) {
        const time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        html += `<option value="${time}" ${time === selected ? 'selected' : ''}>${time}</option>`;
      }
    }
    return html;
  }

  function addSection() {
    const input = document.getElementById('sectionInput');
    const val = input.value.trim();
    if (!val || sections.includes(val)) { input.value = ''; return; }
    sections.push(val);
    renderSections();
    input.value = '';
  }

  function removeSection(name) {
    sections = sections.filter(s => s !== name);
    renderSections();
  }

  function renderSections() {
    const container = document.getElementById('sectionTags');
    container.innerHTML = sections.map(s =>
      `<span class="tag">${s}<span class="tag-del" onclick="removeSection('${s}')">×</span></span>`
    ).join('');
  }

  function switchDayType(dayType) {
    currentDayType = dayType;
    document.getElementById('weekdayTab').className = 'tab-btn ' + (dayType === '平日' ? 'active' : 'inactive');
    document.getElementById('holidayTab').className = 'tab-btn ' + (dayType === '休日' ? 'active' : 'inactive');
    document.getElementById('previewArea').style.display = 'none';
    renderShiftSections();
  }

  function renderShiftSections() {
    const container = document.getElementById('shiftSections');
    const sectionList = sections.length > 0 ? sections : ['（セクションなし）'];

    container.innerHTML = sectionList.map(section => {
      const frames = shiftTemplateData[currentDayType][section] || [];
      return `
        <div style="background:white; border-radius:10px; padding:15px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
          <div style="font-weight:bold; margin-bottom:10px; color:#333;">📌 ${section}</div>
          <div id="frames_${currentDayType}_${section}">
            ${frames.map((f, idx) => renderFrame(section, idx, f)).join('')}
          </div>
          <button onclick="addFrame('${section}')"
            style="width:100%; padding:8px; border:2px dashed #06C755; background:none; color:#06C755; border-radius:5px; cursor:pointer; margin-top:5px;">
            ＋ 枠を追加
          </button>
        </div>
      `;
    }).join('');
  }

  function renderFrame(section, idx, frame) {
    const startVal = frame ? frame.startTime : '10:00';
    const endVal = frame ? frame.endTime : '18:00';
    const numVal = frame ? frame.requiredNum : 1;
    return `
      <div style="display:flex; align-items:center; gap:5px; margin-bottom:8px; flex-wrap:wrap;">
        <select onchange="updateFrame('${section}', ${idx}, 'startTime', this.value)"
          style="flex:1; padding:8px; border:1px solid #ddd; border-radius:5px; font-size:14px;">
          ${generateTimeOptionsHTML(startVal)}
        </select>
        <span>〜</span>
        <select onchange="updateFrame('${section}', ${idx}, 'endTime', this.value)"
          style="flex:1; padding:8px; border:1px solid #ddd; border-radius:5px; font-size:14px;">
          ${generateTimeOptionsHTML(endVal)}
        </select>
        <input type="number" min="1" max="20" value="${numVal}"
          onchange="updateFrame('${section}', ${idx}, 'requiredNum', this.value)"
          style="width:55px; padding:8px; border:1px solid #ddd; border-radius:5px; text-align:center;">
        <span style="color:#888; font-size:12px;">人</span>
        <button onclick="removeFrame('${section}', ${idx})"
          style="background:#ff4444; color:white; border:none; border-radius:5px; padding:8px 10px; cursor:pointer;">
          🗑️
        </button>
      </div>
    `;
  }

  function addFrame(section) {
    if (!shiftTemplateData[currentDayType][section]) shiftTemplateData[currentDayType][section] = [];
    shiftTemplateData[currentDayType][section].push({ startTime: '10:00', endTime: '18:00', requiredNum: 1 });
    renderShiftSections();
  }

  function removeFrame(section, idx) {
    shiftTemplateData[currentDayType][section].splice(idx, 1);
    renderShiftSections();
  }

  function updateFrame(section, idx, key, value) {
    if (!shiftTemplateData[currentDayType][section]) return;
    shiftTemplateData[currentDayType][section][idx][key] = value;
  }

  // プレビュー表示
  function showPreview() {
  const sectionList = sections.length > 0 ? sections : ['（セクションなし）'];
  const frames = shiftTemplateData[currentDayType];

  // 全時間を30分刻みで生成
  const allTimes = [];
  for (let h = 0; h < 24; h++) {
    for (let m of [0, 30]) {
      allTimes.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
  }

  // 使われている時間範囲を特定
  let minTime = '23:30';
  let maxTime = '00:00';
  for (const section of sectionList) {
    for (const f of (frames[section] || [])) {
      if (f.startTime < minTime) minTime = f.startTime;
      if (f.endTime > maxTime) maxTime = f.endTime;
    }
  }

  if (minTime === '23:30' && maxTime === '00:00') {
    alert('枠が設定されていません');
    return;
  }

  // 表示する時間スロットを絞る
  const slots = allTimes.filter(t => t >= minTime && t < maxTime);

  // テーブル生成
  let html = '<tr><th style="min-width:80px">セクション</th>';
  for (const t of slots) {
    html += `<th style="min-width:45px; font-size:11px;">${t}</th>`;
  }
  html += '</tr>';

  for (const section of sectionList) {
    html += `<tr><td class="section-cell">${section}</td>`;
    for (const slot of slots) {
      const slotEnd = allTimes[allTimes.indexOf(slot) + 1];
      const matching = (frames[section] || []).find(f => f.startTime <= slot && f.endTime >= slotEnd);
      if (matching) {
        // 枠の開始点かどうか確認
        const isStart = matching.startTime === slot;
        if (isStart) {
          // 何スロット分か計算
          const startIdx = slots.indexOf(matching.startTime);
          const endIdx = slots.indexOf(matching.endTime);
          const span = endIdx - startIdx;
          html += `<td colspan="${span}" style="background:#06C755; color:white; text-align:center; border-radius:5px; padding:5px; font-size:12px; font-weight:bold;">${matching.requiredNum}人</td>`;
        }
        // isStartでない場合はcolspanで既に埋まっているのでスキップ
      } else {
        html += `<td class="empty-cell"></td>`;
      }
    }
    html += '</tr>';
  }

  document.getElementById('previewTable').innerHTML = html;
  document.getElementById('previewDayType').innerText = currentDayType;
  document.getElementById('previewArea').style.display = 'block';

  // プレビューまでスクロール
  document.getElementById('previewArea').scrollIntoView({ behavior: 'smooth' });
}

  async function saveShiftTemplate() {
    const btn = document.getElementById('shiftSaveBtn');
    const status = document.getElementById('shiftStatus');
    btn.disabled = true;

    const entries = [];
    for (const dayType of ['平日', '休日']) {
      const sectionList = sections.length > 0 ? sections : ['（セクションなし）'];
      for (const section of sectionList) {
        for (const frame of (shiftTemplateData[dayType][section] || [])) {
          entries.push({ dayType, section, startTime: frame.startTime, endTime: frame.endTime, requiredNum: frame.requiredNum });
        }
      }
    }

    try {
      const result = await callGAS({ action: 'saveShiftTemplate', storeId, entries });
      if (result.success) {
        status.className = 'status success';
        status.innerText = '✅ 保存しました！';
      } else {
        status.className = 'status error';
        status.innerText = '❌ ' + result.msg;
      }
    } catch (err) {
      status.className = 'status error';
      status.innerText = '❌ エラー: ' + err.message;
    } finally {
      btn.disabled = false;
    }
  }

  async function loadShiftTemplate() {
    try {
      const result = await callGAS({ action: 'getShiftTemplate', storeId });
      if (result.success) {
        shiftTemplateData = { '平日': {}, '休日': {} };
        for (const entry of result.data) {
          if (!shiftTemplateData[entry.dayType][entry.section]) shiftTemplateData[entry.dayType][entry.section] = [];
          shiftTemplateData[entry.dayType][entry.section].push({
            startTime: entry.startTime,
            endTime: entry.endTime,
            requiredNum: entry.requiredNum
          });
        }
      }
    } catch (err) { console.error(err); }
  }

  async function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'shiftScreen') {
      await loadShiftTemplate();
      renderShiftSections();
    }
  }

  async function callGAS(params) {
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(params) });
    return await res.json();
  }

  async function saveStore() {
    const btn = document.getElementById('storeSaveBtn');
    const status = document.getElementById('storeStatus');
    btn.disabled = true;
    try {
      const result = await callGAS({
        action: 'saveStore', storeId,
        storeName: document.getElementById('storeName').value.trim(),
        openTime: document.getElementById('openTime').value,
        closeTime: document.getElementById('closeTime').value,
        holiday: document.getElementById('holiday').value,
        sections: sections.join(',')
      });
      status.className = result.success ? 'status success' : 'status error';
      status.innerText = result.success ? '✅ 保存しました！' : '❌ ' + result.msg;
    } catch (err) {
      status.className = 'status error';
      status.innerText = '❌ エラー: ' + err.message;
    } finally { btn.disabled = false; }
  }

  async function saveSettings() {
    const btn = document.getElementById('settingsSaveBtn');
    const status = document.getElementById('settingsStatus');
    btn.disabled = true;
    try {
      const result = await callGAS({
        action: 'saveSettings', storeId,
        cycle: document.getElementById('cycle').value,
        deadline: document.getElementById('deadline').value,
        submitDeadline: document.getElementById('submitDeadline').value,
        notifyTiming: document.getElementById('notifyTiming').value
      });
      status.className = result.success ? 'status success' : 'status error';
      status.innerText = result.success ? '✅ 保存しました！' : '❌ ' + result.msg;
    } catch (err) {
      status.className = 'status error';
      status.innerText = '❌ エラー: ' + err.message;
    } finally { btn.disabled = false; }
  }

  window.onload = async function() {
    generateTimeOptions('openTime');
    generateTimeOptions('closeTime');
    generateDayOptions('deadline');
    generateDayOptions('submitDeadline');

    const status = document.getElementById('initStatus');
    try {
      await liff.init({ liffId: MY_LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();

      const result = await callGAS({ action: 'checkAdmin', uid: userProfile.userId });
      if (!result.success) {
        status.innerText = '❌ 管理者権限がありません';
        return;
      }

      storeId = result.storeId;
      status.style.display = 'none';
      showScreen('menuScreen');

      if (result.storeData) {
        document.getElementById('storeName').value = result.storeData.name || '';
        document.getElementById('openTime').value = result.storeData.openTime || '';
        document.getElementById('closeTime').value = result.storeData.closeTime || '';
        document.getElementById('holiday').value = result.storeData.holiday || '';
        sections = result.storeData.sections ? result.storeData.sections.split(',').filter(s => s) : [];
        renderSections();
      }
    } catch (err) {
      status.innerText = '❌ エラー: ' + err.message;
    }
  };
</script>
</body>
</html>
